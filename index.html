    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── Identidade Visual Instituto Lótus ── */
        :root {
            --lotus-blue:  #4a5c94;
            --lotus-gold:  #d9c543;
            --lotus-dark:  #2c375a;
            --lotus-light: #f4f6f9;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--lotus-light); overflow-x: hidden; }
        * { box-sizing: border-box; max-width: 100%; }

        /* Cores Lótus como classes utilitárias */
        .text-lotus-blue  { color: var(--lotus-blue) !important; }
        .text-lotus-dark  { color: var(--lotus-dark) !important; }
        .text-lotus-gold  { color: var(--lotus-gold) !important; }
        .bg-lotus-blue    { background-color: var(--lotus-blue) !important; }
        .bg-lotus-gold    { background-color: var(--lotus-gold) !important; }
        .bg-lotus-dark    { background-color: var(--lotus-dark) !important; }
        .bg-lotus-light   { background-color: var(--lotus-light) !important; }
        .bg-lotus-blue-10 { background-color: rgba(74,92,148,0.10) !important; }
        .bg-lotus-blue-5  { background-color: rgba(74,92,148,0.05) !important; }
        .border-lotus-blue    { border-color: var(--lotus-blue) !important; }
        .border-lotus-blue-20 { border-color: rgba(74,92,148,0.20) !important; }
        .border-lotus-blue-40 { border-color: rgba(74,92,148,0.40) !important; }
        .hover-lotus-blue:hover { background-color: var(--lotus-blue) !important; color: white !important; }
        .focus-lotus:focus { outline: none; box-shadow: 0 0 0 3px rgba(74,92,148,0.30) !important; border-color: var(--lotus-blue) !important; }

        /* Componentes */
        .drill-row { cursor: pointer; transition: background-color 0.12s; }
        .drill-row:hover { background-color: #f8fafc; }
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid var(--lotus-gold); border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.18s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity:0.85; transform:scale(1); } 50% { opacity:1; transform:scale(1.06); } }
        .tab-active   { border-bottom: 3px solid var(--lotus-gold); color: var(--lotus-blue); font-weight: 800; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #64748b; }
        .login-bg { background: linear-gradient(135deg, #2c375a 0%, #4a5c94 100%); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: var(--lotus-blue); border-radius: 10px; }
        /* Swipe para voltar no mobile */
        .swipe-area { touch-action: pan-y; }

        /* Sidebar desktop — mais larga e evidente */
        @media (min-width: 1024px) {
            .app-layout { display: flex; min-height: calc(100vh - 64px - 49px); }
            .sidebar { width: 280px; min-width: 280px; background: white; border-right: 2px solid #e2e8f0; position: sticky; top: 113px; height: calc(100vh - 113px); overflow-y: auto; flex-shrink: 0; box-shadow: 2px 0 8px rgba(74,92,148,0.06); }
            .main-content { flex: 1; min-width: 0; padding: 1.25rem 1.75rem; }
        }
        @media (max-width: 1023px) {
            .app-layout { display: block; }
            .sidebar { display: none; }
            .main-content { padding: 1rem; }
        }

        /* Sidebar nav items */
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; font-size: 14px; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.15s; border-left: 4px solid transparent; }
        .sidebar-item:hover { background: rgba(74,92,148,0.06); color: var(--lotus-blue); }
        .sidebar-item.active { background: rgba(74,92,148,0.10); color: var(--lotus-blue); border-left-color: var(--lotus-blue); font-weight: 800; }
        .sidebar-item .item-icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-crumb { font-size: 10px; color: #94a3b8; padding: 14px 20px 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; border-top: 1px solid #f1f5f9; margin-top: 4px; }
        .sidebar-crumb:first-child { border-top: none; margin-top: 0; padding-top: 18px; }

        /* Desktop: KPIs compactos em 4 colunas */
        @media (min-width: 1024px) {
            .kpi-grid { grid-template-columns: repeat(4, 1fr) !important; }
            .kpi-grid-2 { grid-template-columns: repeat(2, 1fr) !important; }
            .kpi-grid-3 { grid-template-columns: repeat(3, 1fr) !important; }
            /* KPI cards menores no desktop */
            .kpi-card-desktop { padding: 10px 14px !important; }
            .kpi-card-desktop .kpi-value { font-size: 1.5rem !important; }
            /* Gráfico menor no desktop */
            .chart-desktop { height: 160px !important; }
            /* Espaçamento menor entre seções no desktop */
            .space-desktop > * + * { margin-top: 0.75rem !important; }
        }
        @media (max-width: 1023px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
    </style>
</head>

// ── KPI Card ──────────────────────────────────────────────────────────────────
const KpiCard = ({ label, value, sub, color='lotus' }) => {
  const styles = {
    lotus:   'border-b-4 border-slate-200 bg-white text-lotus-blue',
    rose:    'border-b-4 border-rose-300 bg-rose-50 text-rose-700',
    amber:   'border-b-4 border-amber-300 bg-amber-50 text-amber-700',
    emerald: 'border-b-4 border-emerald-300 bg-emerald-50 text-emerald-700',
    slate:   'border-b-4 border-slate-200 bg-white text-slate-700',
  };
  return (
    <div className={`rounded-xl border shadow-sm p-3 lg:p-3 kpi-card-desktop ${styles[color]}`}>
      <p className="text-[10px] font-bold uppercase tracking-widest opacity-70">{label}</p>
      <p className="kpi-value text-2xl lg:text-xl font-black mt-0.5">{value}</p>

// ── Distrator Bar ─────────────────────────────────────────────────────────────
const DistratorBar = ({ alt, valor, gabarito }) => {

// ── Sugestão de Intervenção ───────────────────────────────────────────────────
const SugestaoIntervencao = ({ acertos, branco, habilidade, distratorPrincipal, distratores }) => {
  const hab = (habilidade||'').toLowerCase();
  const s = [];
  if (acertos<30) { s.push('📋 Reensinar do zero: introduza o conteúdo com linguagem acessível, exemplos concretos e atividades em grupo.'); s.push('🎯 Diagnóstico individual: identifique se o erro é de leitura, interpretação ou desconhecimento do conteúdo.'); }
  else if (acertos<50) { s.push('🔁 Retomada dirigida: 15-20min reexplicando com abordagem diferente.'); s.push('👥 Monitoria entre pares: alunos com bom desempenho apoiam colegas com dificuldade.'); }
  else if (acertos<70) s.push('📝 Exercícios extras: proponha 3 a 5 questões adicionais em contextos diferentes.');
  if (distratorPrincipal&&distratores&&distratores[distratorPrincipal]>20) s.push(`🧩 Erro conceitual: a alternativa ${distratorPrincipal} atraiu muitos alunos — discuta em aula por que ela está errada.`);
  if (branco>15) s.push('⏱️ Estratégias de prova: treine eliminação de alternativas e gestão do tempo.');
  if (hab.includes('inferir')||hab.includes('implíci')) s.push('📖 Leitura inferencial: "leitura nas entrelinhas" — o que o autor quis dizer, por que o personagem fez...');
  if (hab.includes('gênero')||hab.includes('tipolog')) s.push('📚 Diversifique os textos: diferentes gêneros com atividades de identificação de finalidade e estrutura.');
  if (hab.includes('argumen')||hab.includes('opinião')||hab.includes('tese')) s.push('💬 Debates: rodas de conversa e produção de pequenos textos de opinião.');
  if (hab.includes('coesão')||hab.includes('referenci')||hab.includes('pronome')) s.push('🔗 Reescrita: atividades com pronomes e sinônimos para desenvolver coesão textual.');
  if (hab.includes('localizar')||hab.includes('explícit')) s.push('🔍 Grifar e sublinhar: marcar informações-chave antes de responder.');
  if (hab.includes('fração')||hab.includes('racional')||hab.includes('decimal')) s.push('🍕 Materiais concretos: dobraduras e divisões visuais para tornar frações tangíveis.');
  if (hab.includes('probabilidade')||hab.includes('aleatório')) s.push('🎲 Experimentos: dados, moedas e cartas para explorar probabilidade na prática.');
  if (hab.includes('equação')||hab.includes('algébri')) s.push('⚖️ Modelo da balança: visual de equilíbrio antes de trabalhar simbolicamente.');
  if (hab.includes('geometri')||hab.includes('polígono')||hab.includes('triângu')) s.push('📐 Construção com instrumentos: régua e compasso para explorar propriedades.');
  if (hab.includes('medida')||hab.includes('comprimento')||hab.includes('massa')) s.push('📏 Medições reais: medir objetos da sala para contextualizar unidades de medida.');
  if (s.length===0) return null;
  return (
    <div className="mt-3 pt-3 border-t border-slate-100">
      <p className="text-xs font-bold uppercase text-lotus-blue mb-2">💡 Sugestões de Intervenção</p>
      <ul className="space-y-1.5">
        {s.map((t,i)=><li key={i} className="text-xs text-slate-700 bg-lotus-blue-5 rounded-lg px-3 py-2 border border-lotus-blue-20">{t}</li>)}
      </ul>
    </div>
  );
};

  const [limite, setLimite] = useState(5);
  const medalhas = ['🥇','🥈','🥉'];
  const top3 = itens.slice(0,3);
  const visiveis = itens.slice(0, limite);

  return (
    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

          {!aberto && top3.length>0 && (
            <p className="text-[11px] text-slate-400 mt-0.5">

          )}

        <div className={`shrink-0 w-7 h-7 rounded-full flex items-center justify-center transition-all ml-3 ${aberto?'bg-lotus-blue text-white':'bg-slate-100 text-slate-400'}`}>
          <svg className="w-3.5 h-3.5" style={{transform:aberto?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </button>

      {aberto && (
        <div className="border-t border-slate-100">
          {itens.length === 0 ? (
            <p className="text-center py-6 text-slate-400 text-xs">{emptyMsg}</p>

            <>

              {top3.length >= 3 && (
                <div className="grid grid-cols-3 gap-2 p-3 bg-slate-50 border-b border-slate-100">
                  {[top3[1],top3[0],top3[2]].map((item,i)=>{
                    const pos=[2,1,3][i]; const isFirst=pos===1;

                      <div key={i} className={`rounded-xl p-2.5 text-center border ${isFirst?'border-yellow-300 bg-yellow-50':'border-slate-200 bg-white'}`}>

                        <p className={`font-black mt-1 ${isFirst?'text-base text-yellow-600':'text-sm text-lotus-blue'}`}>{item._valor}</p>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Lista */}
              <div className="divide-y divide-slate-50">
                {visiveis.map((item,i)=>(
                  <div key={i} className={`flex items-center gap-3 px-4 py-2.5 ${i<3?'bg-white':''}`}>
                    <span className={`text-sm font-black w-7 shrink-0 ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-300'}`}>
                      {i<3?medalhas[i]:`${i+1}º`}
                    </span>
                    {renderLinha(item, i)}
                  </div>
                ))}
              </div>

              {itens.length > limite && (
                <button onClick={()=>setLimite(l=>l+5)}

            </>

  );

const ViewPolo = ({ appData, poloData, onDrillDown }) => {
  const escolas=appData?.escolasPorPolo?.[poloData?.id]||[];
  const todosAlunos=useMemo(()=>{if(!appData?.turmasPorEscola||!appData?.alunosPorTurma)return[];return escolas.flatMap(e=>(appData.turmasPorEscola[e.id]||[]).flatMap(t=>appData.alunosPorTurma[t.id]||[]));}, [appData,escolas]);
  const emRisco=todosAlunos.filter(a=>a.status==='Risco').length, emAtencao=todosAlunos.filter(a=>a.status==='Atenção').length;
  const chartData=escolas.map(e=>({name:e.escola.length>10?e.escola.slice(0,10)+'…':e.escola,'PREPARA':e.prepara||0,'1ª Avaliação':e.aval1||0}));
  // Ranking de escolas do polo
  const rankingEscolas = useMemo(()=>escolas.map(e=>{
    const alunos=(appData?.turmasPorEscola?.[e.id]||[]).flatMap(t=>appData?.alunosPorTurma?.[t.id]||[]);
    const media=alunos.length?alunos.reduce((s,a)=>s+(a.geralAtual||0),0)/alunos.length:0;
    const mediaLP=alunos.length?alunos.reduce((s,a)=>s+(a.lp2||0),0)/alunos.length:0;
    const mediaMat=alunos.length?alunos.reduce((s,a)=>s+(a.ma2||0),0)/alunos.length:0;
    const avancados=alunos.filter(a=>a.status==='Avançado').length;
    return {_label:e.escola.split(' ').slice(0,3).join(' '), _sub:`${alunos.length} alunos`, _valor:fmt(media), media, mediaLP, mediaMat, avancados, total:alunos.length, escola:e.escola};
  }).filter(e=>e.total>0).sort((a,b)=>b.media-a.media), [appData,escolas]);

  return (
    <div className="space-y-4 lg:space-y-3 fade-in">
      <div className="grid grid-cols-2 gap-3 kpi-grid">
        <KpiCard label="Escolas" value={escolas.length} color="slate"/>
        <KpiCard label="Alunos" value={todosAlunos.length} color="slate"/>
        <KpiCard label="Em Risco" value={emRisco} color="rose"/>
        <KpiCard label="Em Atenção" value={emAtencao} color="amber"/>

};

const ViewAluno = ({ aluno, appData }) => {
  if (!aluno) return null;
  const sc=STATUS[aluno.status]||STATUS.Adequado;
  const comps=[
    {label:'Língua Portuguesa', emoji:'📖', cc:'LÍNGUA PORTUGUESA', ant:aluno.lp1, atual:aluno.lp2},
    {label:'Matemática',        emoji:'🔢', cc:'MATEMÁTICA',        ant:aluno.ma1, atual:aluno.ma2},
  ];

  // Extrai o número do ano do aluno (ex: "5º Ano A" → "5º ano")
  const anoAluno = aluno.turma ? aluno.turma.replace(/º Ano.*/i,'º ano').trim() : null;

  // Busca TODOS os itens do ano do aluno (sem filtrar por acerto da turma ainda)
  const analiseItens = appData?.analiseItens?.aval1 || [];
  const itensPorCC = {};
  analiseItens
    .filter(g => anoAluno && g.ano?.toLowerCase() === anoAluno.toLowerCase())
    .forEach(g => {
      if (!itensPorCC[g.cc]) itensPorCC[g.cc] = [];
      g.itens.forEach(i => itensPorCC[g.cc].push(i));
    });

  // Para cada componente, decide SE e QUAIS habilidades mostrar baseado na nota DO ALUNO
  const getCriticosPorComponente = (cc, notaAluno) => {
    if (notaAluno == null) return [];
    const itens = itensPorCC[cc] || [];

    // Limiar de acerto da turma varia conforme a nota do aluno:
    // Aluno em risco (<5): mostra itens com acerto da turma < 70% (mais amplo)
    // Aluno em atenção (5-7): mostra itens com acerto da turma < 55%
    // Aluno adequado/avançado (≥7): mostra itens com acerto da turma < 40% (só os críticos)
    const limiar = notaAluno < 5 ? 70 : notaAluno < 7 ? 55 : 40;

    return itens
      .filter(i => i.acertos < limiar)
      .sort((a, b) => a.acertos - b.acertos) // mais frágeis primeiro
      .slice(0, 6);
  };

  return (
    <div className="space-y-4 lg:space-y-3 fade-in">

          <div>

            <p className="text-xs text-slate-400">Matrícula: {aluno.matricula}</p>
          </div>
          <span className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold shrink-0 ${sc.bg} ${sc.text}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${sc.dot}`}/>{aluno.status}
          </span>
        </div>
      </div>

      {/* Nota geral */}
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
        <p className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3">Nota Geral — PREPARA vs 1ª Avaliação</p>
        <div className="flex items-center gap-2">
          <div className="flex-1 bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
            <p className="text-[11px] text-slate-500 uppercase font-bold mb-1">PREPARA</p>
            <p className={`text-3xl font-black ${notaColor(aluno.geralAnt)}`}>{aluno.geralAnt!=null?fmt(aluno.geralAnt):'—'}</p>
          </div>
          <div className="text-center px-1">
            {aluno.geralAnt!=null?(<><p className={`text-2xl font-black ${difColor(aluno.dif)}`}>{aluno.dif>0?'▲':aluno.dif<0?'▼':'='}</p><p className={`text-xs font-black ${difColor(aluno.dif)}`}>{Math.abs(aluno.dif).toFixed(1)} pts</p></>):<p className="text-slate-300 text-lg">→</p>}
          </div>
          <div className={`flex-1 rounded-xl p-3 text-center border ${aluno.dif>0?'bg-emerald-50 border-emerald-200':aluno.dif<0?'bg-rose-50 border-rose-200':'bg-lotus-blue-5 border-lotus-blue-20'}`}>
            <p className="text-[11px] text-slate-500 uppercase font-bold mb-1">1ª Avaliação</p>
            <p className={`text-3xl font-black ${notaColor(aluno.geralAtual)}`}>{fmt(aluno.geralAtual)}</p>
          </div>
        </div>
      </div>

      {/* Por componente + competências críticas integradas */}
      {comps.map(c=>{
        const dif=c.ant!=null?c.atual-c.ant:null;
        // Habilidades priorizadas pela nota DO ALUNO neste componente

  useEffect(()=>{

      // filtro por faixa de acerto — não altera dropdowns, filtra inline
    }
    if (filtroExterno?.habilidadeCod) {
      // filtro por habilidade — não altera dropdowns
    }
  }, [filtroExterno]);

  const dados = analiseItens?.[prova]||[];
  const anos  = ['todos',...new Set(dados.map(g=>g.ano))].sort();
  const ccs   = ['todos',...new Set(dados.map(g=>g.cc))];

  // Filtragem base
  let filtrados = dados.filter(g=>(anoF==='todos'||g.ano===anoF)&&(ccF==='todos'||g.cc===ccF));

  if (filtroExterno?.faixaMin !== undefined) {
    filtrados = filtrados.map(g => ({
      ...g,
      itens: g.itens.filter(i => i.acertos >= filtroExterno.faixaMin && i.acertos < filtroExterno.faixaMax)
    })).filter(g => g.itens.length > 0);

  if (filtroExterno?.habilidadeCod) {
    filtrados = filtrados.map(g => ({
      ...g,
      itens: g.itens.filter(i => i.habilidade.startsWith(filtroExterno.habilidadeCod))
    })).filter(g => g.itens.length > 0);
  }

  const itensPlanos        = filtrados.flatMap(g=>g.itens);
  const totalItensUnicos   = filtrados.reduce((s,g)=>s+g.itens.length,0);
  const mediaAcerto        = itensPlanos.length?(itensPlanos.reduce((s,i)=>s+i.acertos,0)/itensPlanos.length).toFixed(1):'—';

  const fracos             = itensPlanos.filter(i=>i.acertos>=30&&i.acertos<50).length;
  const labelGrupo         = anoF!=='todos'&&ccF!=='todos'?`${anoF} · ${ccF}`:anoF!=='todos'?anoF:ccF!=='todos'?ccF:'todos os grupos';

  return (

      {filtroExterno && (
        <div className="flex items-center gap-3 bg-lotus-blue-10 border border-lotus-blue-20 rounded-xl px-4 py-3">
          <span className="text-sm font-bold text-lotus-dark flex-1">
            {filtroExterno.faixaMin !== undefined && `🔍 Exibindo itens com acerto entre ${filtroExterno.faixaMin}% e ${filtroExterno.faixaMax === 100 ? '100' : filtroExterno.faixaMax}%`}
            {filtroExterno.habilidadeCod && `🔍 Filtrando pela habilidade: ${filtroExterno.habilidadeCod}`}
          </span>
          <button onClick={onLimparFiltro} className="text-xs font-bold text-lotus-blue border border-lotus-blue-20 bg-white px-3 py-1.5 rounded-lg hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 transition-colors">
            ✕ Limpar filtro
          </button>
        </div>
      )}

      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-wrap gap-2 items-center">
        <span className="text-xs font-bold uppercase text-slate-500 mr-2">Prova:</span>
        {[['aval1','1ª Avaliação 2025'],['prepara','PREPARA SAEB']].map(([k,l])=>(
          <button key={k} onClick={()=>setProva(k)} className={`text-sm px-4 py-1.5 rounded-full font-semibold border transition-colors ${prova===k?'bg-lotus-blue text-white border-lotus-blue':'bg-white text-slate-600 border-slate-200'}`}>{l}</button>
        ))}
      </div>

      <div className="grid grid-cols-2 gap-3 kpi-grid">
        <KpiCard label="Itens por Grupo" value={totalItensUnicos} sub={`em ${filtrados.length} grupo(s)`} color="slate"/>
        <KpiCard label="Média de Acerto" value={`${mediaAcerto}%`} sub={labelGrupo} color="lotus"/>
        <KpiCard label="Itens Críticos"  value={criticos} sub="<30% acerto" color="rose"/>

      </div>

      {!filtroExterno && (
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-wrap gap-4 items-center">
          <div><label className="text-xs font-bold text-slate-500 mr-2">Ano:</label>
            <select value={anoF} onChange={e=>setAnoF(e.target.value)} className="text-sm border border-slate-200 rounded-lg px-2 py-1">
              {anos.map(a=><option key={a} value={a}>{a==='todos'?'Todos os anos':a}</option>)}
            </select>
          </div>
          <div><label className="text-xs font-bold text-slate-500 mr-2">Componente:</label>
            <select value={ccF} onChange={e=>setCcF(e.target.value)} className="text-sm border border-slate-200 rounded-lg px-2 py-1">
              {ccs.map(c=><option key={c} value={c}>{c==='todos'?'Todos':c}</option>)}
            </select>
          </div>
        </div>
      )}

      {filtrados.length===0 && <div className="text-center py-12 text-slate-400"><p className="text-3xl mb-2">📭</p><p>Nenhum item encontrado para este filtro.</p></div>}
      {filtrados.map((grupo,gi)=><ItensGrupo key={gi} grupo={grupo} gi={gi}/>)}
    </div>
  );
};

const ViewPaineis = ({ appData, onIrParaItens, onIrParaEscola }) => {
  const [filtroAno, setFiltroAno] = useState('todos');

  const todosAlunos = useMemo(() => appData?.alunosPorTurma ? Object.values(appData.alunosPorTurma).flat() : [], [appData]);
  const polos       = appData?.rede || [];
  const analiseItens = appData?.analiseItens?.aval1 || [];

  // Filtra alunos por ano se necessário
  const alunosFiltrados = useMemo(() => {
    if (filtroAno === 'todos') return todosAlunos;
    return todosAlunos.filter(a => a.turma && a.turma.startsWith(filtroAno));
  }, [todosAlunos, filtroAno]);

  const anos = ['todos', ...Array.from(new Set(todosAlunos.map(a => a.turma?.split('º')[0]).filter(Boolean))).sort((a,b)=>Number(a)-Number(b)).map(n => n+'º')];

  // 1. Pizza de status
  const statusCount = ['Risco','Atenção','Adequado','Avançado'].map(s => ({
    name: s, value: alunosFiltrados.filter(a=>a.status===s).length
  })).filter(d => d.value > 0);
  const STATUS_COLORS = { Risco:'#f43f5e', Atenção:'#f59e0b', Adequado:'#10b981', Avançado:'#4a5c94' };

  // 2. LP vs Matemática por polo
  const lpMaPorPolo = polos.map(p => {
    const escolaIds = (appData?.escolasPorPolo?.[p.id]||[]).map(e=>e.id);
    const turmaIds  = escolaIds.flatMap(eid => (appData?.turmasPorEscola?.[eid]||[]).map(t=>t.id));
    const alunos    = turmaIds.flatMap(tid => appData?.alunosPorTurma?.[tid]||[]);
    const lp  = alunos.length ? alunos.reduce((s,a)=>s+(a.lp2||0),0)/alunos.length : 0;
    const ma  = alunos.length ? alunos.reduce((s,a)=>s+(a.ma2||0),0)/alunos.length : 0;
    return { name: p.polo.length>12?p.polo.slice(0,12)+'…':p.polo, 'Língua Port.': +lp.toFixed(2), 'Matemática': +ma.toFixed(2) };
  });

  // 3. Evolução média por polo (PREPARA → 1ª Aval)
  const evolucaoPorPolo = polos.map(p => ({
    name: p.polo.length>12?p.polo.slice(0,12)+'…':p.polo,
    PREPARA: p.prepara ? +p.prepara.toFixed(2) : 0,
    'Avaliação': p.aval1 ? +p.aval1.toFixed(2) : 0,
    variacao: p.prepara ? +(p.aval1 - p.prepara).toFixed(2) : 0
  }));

  // 4. Top 10 habilidades mais frágeis
  const todasHabilidades = {};
  analiseItens.forEach(grupo => {
    grupo.itens.forEach(item => {
      const cod = item.habilidade.split(' ')[0];
      if (!todasHabilidades[cod]) todasHabilidades[cod] = { cod, desc: item.habilidade.split(' ').slice(1).join(' ').slice(0,50)+'…', soma:0, count:0 };
      todasHabilidades[cod].soma  += item.acertos;
      todasHabilidades[cod].count += 1;
    });
  });
  const top10Frageis = Object.values(todasHabilidades)
    .map(h => ({ ...h, media: +(h.soma/h.count).toFixed(1) }))
    .sort((a,b) => a.media-b.media).slice(0,10);

  // 5. Distribuição de acerto por faixa
  const itensPlanos = analiseItens.flatMap(g=>g.itens);
  const faixas = [
    { name:'Crítico\n(<30%)',   value: itensPlanos.filter(i=>i.acertos<30).length,               fill:'#f43f5e' },
    { name:'Fraco\n(30-50%)',   value: itensPlanos.filter(i=>i.acertos>=30&&i.acertos<50).length, fill:'#f59e0b' },
    { name:'Parcial\n(50-70%)', value: itensPlanos.filter(i=>i.acertos>=50&&i.acertos<70).length, fill:'#facc15' },
    { name:'Bom\n(≥70%)',       value: itensPlanos.filter(i=>i.acertos>=70).length,               fill:'#10b981' },
  ].filter(d=>d.value>0);

  // 6. Escolas com maior concentração de risco
  const todasEscolas = appData?.escolasPorPolo ? Object.values(appData.escolasPorPolo).flat() : [];

// ── VIEW: RANKINGS ────────────────────────────────────────────────────────────
const ViewRankings = ({ appData }) => {
  const medalhas = ['🥇','🥈','🥉'];
  const todosAlunos = useMemo(()=>appData?.alunosPorTurma?Object.values(appData.alunosPorTurma).flat():[], [appData]);
  const polos = appData?.rede||[];
  const todasEscolas = useMemo(()=>appData?.escolasPorPolo?Object.values(appData.escolasPorPolo).flat():[], [appData]);

  // Pódio reutilizável
  const Podio = ({ itens, renderCard }) => (
    itens.length >= 3 ? (
      <div className="grid grid-cols-3 gap-2 mb-4 items-end">
        {[itens[1],itens[0],itens[2]].map((item,i)=>{
          const pos=[2,1,3][i]; const isFirst=pos===1;
          return (
            <div key={i} className={`rounded-xl p-2.5 text-center border-2 ${isFirst?'border-yellow-400 bg-yellow-50':'border-slate-200 bg-slate-50'}`}>
              {renderCard(item,pos,isFirst)}
            </div>
          );
        })}
      </div>
    ) : null
  );

  // Estados do ranking de escolas
  const [filtroPoloRank, setFiltroPoloRank] = useState('todos');
  const [abrirEscolas, setAbrirEscolas] = useState(false);

  const escolasComMedia = useMemo(()=>todasEscolas.map(e=>{
    const turmas=appData?.turmasPorEscola?.[e.id]||[];
    const alunos=turmas.flatMap(t=>appData?.alunosPorTurma?.[t.id]||[]);
    const media=alunos.length?alunos.reduce((s,a)=>s+(a.geralAtual||0),0)/alunos.length:0;
    const mediaLP=alunos.length?alunos.reduce((s,a)=>s+(a.lp2||0),0)/alunos.length:0;
    const mediaMat=alunos.length?alunos.reduce((s,a)=>s+(a.ma2||0),0)/alunos.length:0;
    const avancados=alunos.filter(a=>a.status==='Avançado').length;
    const risco=alunos.filter(a=>a.status==='Risco').length;
    const polo=polos.find(p=>(appData?.escolasPorPolo?.[p.id]||[]).some(x=>x.id===e.id));
    return {...e, media:+media.toFixed(2), mediaLP:+mediaLP.toFixed(2), mediaMat:+mediaMat.toFixed(2), avancados, risco, total:alunos.length, polo:polo?.polo||'—'};
  }).filter(e=>e.total>0).sort((a,b)=>b.media-a.media), [appData, todasEscolas, polos]);

  const polosDisponiveis = ['todos', ...Array.from(new Set(escolasComMedia.map(e=>e.polo))).sort()];
  const escolasFiltradas = filtroPoloRank==='todos' ? escolasComMedia : escolasComMedia.filter(e=>e.polo===filtroPoloRank);

  // Estados do ranking de alunos
  const [filtroAnoRank, setFiltroAnoRank] = useState('todos');
  const [filtroStatus, setFiltroStatus] = useState('todos');
  const [limitRank, setLimitRank] = useState(10);
  const [abrirAlunos, setAbrirAlunos] = useState(false);

  const anosRank = ['todos', ...Array.from(new Set(todosAlunos.map(a=>a.turma?.split('º')[0]).filter(Boolean))).sort((a,b)=>Number(a)-Number(b)).map(n=>n+'º')];

  const rankingAlunos = useMemo(()=>todosAlunos
    .filter(a=>a.geralAtual!=null)
    .filter(a=>filtroAnoRank==='todos'||(a.turma&&a.turma.startsWith(filtroAnoRank)))
    .filter(a=>filtroStatus==='todos'||a.status===filtroStatus)
    .sort((a,b)=>(b.geralAtual||0)-(a.geralAtual||0)),
  [todosAlunos, filtroAnoRank, filtroStatus]);

  return (
    <div className="space-y-4 lg:space-y-3 fade-in">

      {/* KPIs */}
      <div className="grid grid-cols-2 gap-3 kpi-grid">
        <KpiCard label="Total de Escolas" value={escolasComMedia.length} color="slate"/>
        <KpiCard label="Melhor Escola" value={escolasFiltradas[0]?.media??'—'} sub={escolasFiltradas[0]?.escola?.split(' ').slice(0,3).join(' ')} color="lotus"/>
        <KpiCard label="Total de Alunos" value={rankingAlunos.length} color="slate"/>
        <KpiCard label="Melhor Aluno" value={rankingAlunos[0]?.geralAtual!=null?fmt(rankingAlunos[0].geralAtual):'—'} sub={rankingAlunos[0]?.nome?.split(' ').slice(0,2).join(' ')} color="lotus"/>
      </div>

      {/* ── CARD RANKING ESCOLAS ── */}
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <button onClick={()=>setAbrirEscolas(!abrirEscolas)}
          className="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors text-left">
          <div className="flex-1 min-w-0">
            <h2 className="font-black text-lotus-dark text-base">🏫 Ranking de Escolas</h2>
            <p className="text-xs text-slate-400 mt-0.5">Ordenadas pela maior média geral na 1ª Avaliação</p>
            {!abrirEscolas && escolasFiltradas.length > 0 && (
              <div className="flex items-center gap-3 mt-2 flex-wrap">
                {escolasFiltradas.slice(0,3).map((e,i)=>(
                  <span key={i} className="flex items-center gap-1 text-xs">
                    <span>{medalhas[i]}</span>
                    <span className="font-bold text-lotus-dark truncate max-w-[120px]">{e.escola.split(' ').slice(0,3).join(' ')}</span>
                    <span className={`font-black ${notaColor(e.media)}`}>{fmt(e.media)}</span>
                  </span>
                ))}

          <div className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all ml-4 ${abrirEscolas?'bg-lotus-blue text-white':'bg-slate-100 text-slate-400'}`}>
            <svg className="w-4 h-4" style={{transform:abrirEscolas?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}} fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
        </button>
        {abrirEscolas && (
          <div className="border-t border-slate-100">
            <div className="px-5 py-3 border-b border-slate-100 flex flex-wrap gap-1.5 items-center">
              <span className="text-[11px] font-bold text-slate-500 uppercase mr-1">Polo:</span>
              {polosDisponiveis.map(p=>(
                <button key={p} onClick={()=>setFiltroPoloRank(p)}
                  className={`text-[10px] px-2.5 py-2 rounded-full font-bold border transition-colors min-h-[36px] ${filtroPoloRank===p?'bg-lotus-blue text-white border-lotus-blue':'bg-white text-slate-500 border-slate-200'}`}>
                  {p==='todos'?'Todos':p.length>16?p.slice(0,16)+'…':p}
                </button>
              ))}
            </div>
            <div className="p-4">
              <Podio itens={escolasFiltradas} renderCard={(e,pos,isFirst)=>(
                <>
                  <p className="text-xl mb-1">{medalhas[pos-1]}</p>
                  <p className={`font-black leading-tight ${isFirst?'text-xs':'text-[11px]'} text-lotus-dark`}>{e.escola.length>22?e.escola.slice(0,22)+'…':e.escola}</p>
                  <p className="text-[11px] text-slate-500 mt-0.5">{e.polo.length>16?e.polo.slice(0,16)+'…':e.polo}</p>
                  <p className={`font-black mt-1 ${isFirst?'text-xl text-yellow-600':'text-lg text-lotus-blue'}`}>{fmt(e.media)}</p>
                  <p className="text-[11px] text-slate-500">média geral</p>
                  <div className="flex justify-center gap-2 mt-1 text-[10px]">
                    <span className={`font-bold ${notaColor(e.mediaLP)}`}>LP {fmt(e.mediaLP)}</span>
                    <span className="text-slate-300">·</span>
                    <span className={`font-bold ${notaColor(e.mediaMat)}`}>Mat {fmt(e.mediaMat)}</span>
                  </div>
                </>
              )}/>
              <div className="rounded-xl overflow-hidden border border-slate-100">
                <div className="hidden lg:grid px-4 py-2 text-[10px] font-bold uppercase tracking-wider text-slate-400 bg-slate-50 border-b border-slate-200"
                  style={{gridTemplateColumns:'40px 1fr 120px 70px 70px 70px 70px 80px'}}>
                  <span>#</span><span>Escola</span><span>Polo</span>
                  <span className="text-center">📖 LP</span><span className="text-center">🔢 Mat</span>
                  <span className="text-center">Avanç.</span><span className="text-center">Risco</span>
                  <span className="text-right">Média</span>
                </div>
                {escolasFiltradas.map((e,i)=>(
                  <div key={i} className={`border-b border-slate-100 last:border-0 ${i<3?'bg-white':'hover:bg-slate-50'} transition-colors`}>
                    <div className="hidden lg:grid px-4 py-2.5 items-center"
                      style={{gridTemplateColumns:'40px 1fr 120px 70px 70px 70px 70px 80px'}}>
                      <span className={`text-sm font-black ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-300'}`}>{i<3?medalhas[i]:`${i+1}º`}</span>
                      <div className="min-w-0"><p className="text-xs font-bold text-slate-800 truncate">{e.escola}</p><p className="text-[11px] text-slate-500">{e.total} alunos</p></div>
                      <span className="text-[10px] text-slate-500 truncate">{e.polo.length>14?e.polo.slice(0,14)+'…':e.polo}</span>

                      <span className={`text-xs font-black text-center ${notaColor(e.mediaMat)}`}>{fmt(e.mediaMat)}</span>
                      <span className="text-xs font-bold text-center text-emerald-600">{e.avancados}</span>
                      <span className="text-xs font-bold text-center text-rose-500">{e.risco}</span>
                      <span className={`text-sm font-black text-right ${notaColor(e.media)}`}>{fmt(e.media)}</span>

                    <div className="lg:hidden px-4 py-3 flex items-center gap-3">
                      <span className={`text-base font-black shrink-0 w-7 ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-300'}`}>{i<3?medalhas[i]:`${i+1}º`}</span>
                      <div className="flex-1 min-w-0">

                        <div className="flex gap-3 mt-0.5 text-[10px]">
                          <span className={`font-bold ${notaColor(e.mediaLP)}`}>LP {fmt(e.mediaLP)}</span>
                          <span className={`font-bold ${notaColor(e.mediaMat)}`}>Mat {fmt(e.mediaMat)}</span>

            {!abrirAlunos && rankingAlunos.length > 0 && (
              <div className="flex items-center gap-3 mt-2 flex-wrap">
                {rankingAlunos.slice(0,3).map((a,i)=>(
                  <span key={i} className="flex items-center gap-1 text-xs">
                    <span>{medalhas[i]}</span>
                    <span className="font-bold text-lotus-dark truncate max-w-[120px]">{a.nome.split(' ').slice(0,2).join(' ')}</span>

                  </span>
                ))}

              </div>
            )}
          </div>

            <svg className="w-4 h-4" style={{transform:abrirAlunos?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}} fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>

                  <button key={a} onClick={()=>{setFiltroAnoRank(a);setLimitRank(10);}}
                    className={`text-[10px] px-2.5 py-2 rounded-full font-bold border transition-colors min-h-[36px] ${filtroAnoRank===a?'bg-lotus-blue text-white border-lotus-blue':'bg-white text-slate-500 border-slate-200'}`}>
                    {a==='todos'?'Todos':a}
                  </button>
                ))}
              </div>
              <div className="flex flex-wrap gap-1.5 items-center">
                <span className="text-[11px] font-bold text-slate-500 uppercase">Status:</span>
                {['todos','Avançado','Adequado','Atenção','Risco'].map(s=>{
                  const sc=STATUS[s]||null;
                  return (
                    <button key={s} onClick={()=>{setFiltroStatus(s);setLimitRank(10);}}
                      className={`text-[10px] px-2.5 py-2 rounded-full font-bold border transition-colors min-h-[36px] ${filtroStatus===s?sc?`${sc.bg} ${sc.text} border-transparent`:'bg-lotus-blue text-white border-lotus-blue':sc?`bg-white ${sc.text} border-slate-200`:'bg-white text-slate-500 border-slate-200'}`}>
                      {s==='todos'?'Todos':s}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="p-4">
              <Podio itens={rankingAlunos.slice(0,3)} renderCard={(a,pos,isFirst)=>{
                const sc=STATUS[a.status]||STATUS.Adequado;
                return (
                  <>
                    <p className="text-xl mb-1">{medalhas[pos-1]}</p>
                    <p className={`font-black leading-tight ${isFirst?'text-xs':'text-[11px]'} text-lotus-dark`}>{a.nome.split(' ').slice(0,2).join(' ')}</p>
                    <p className="text-[11px] text-slate-500 mt-0.5">{a.turma}</p>
                    <p className={`font-black mt-1 ${isFirst?'text-xl text-yellow-600':'text-lg text-lotus-blue'}`}>{fmt(a.geralAtual)}</p>
                    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold mt-1 ${sc.bg} ${sc.text}`}>
                      <span className={`w-1 h-1 rounded-full ${sc.dot}`}/>{a.status}
                    </span>
                  </>
                );
              }}/>
              <div className="rounded-xl overflow-hidden border border-slate-100">
                <div className="hidden lg:grid px-4 py-2 text-[10px] font-bold uppercase tracking-wider text-slate-400 bg-slate-50 border-b border-slate-200"
                  style={{gridTemplateColumns:'40px 1fr 90px 70px 70px 80px 80px'}}>
                  <span>#</span><span>Aluno</span><span>Turma</span>
                  <span className="text-center">📖 LP</span><span className="text-center">🔢 Mat</span>
                  <span className="text-center">Status</span><span className="text-right">Geral</span>
                </div>
                {rankingAlunos.slice(0,limitRank).map((a,i)=>{
                  const sc=STATUS[a.status]||STATUS.Adequado;
                  return (
                    <div key={i} className={`border-b border-slate-100 last:border-0 ${i<3?'bg-white':'hover:bg-slate-50'} transition-colors`}>
                      <div className="hidden lg:grid px-4 py-2.5 items-center"
                        style={{gridTemplateColumns:'40px 1fr 90px 70px 70px 80px 80px'}}>
                        <span className={`text-sm font-black ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-300'}`}>{i<3?medalhas[i]:`${i+1}º`}</span>
                        <div className="min-w-0"><p className="text-xs font-bold text-slate-800 truncate">{a.nome}</p><p className="text-[11px] text-slate-500 truncate">{a.escola?.length>26?a.escola.slice(0,26)+'…':a.escola}</p></div>
                        <span className="text-[10px] text-slate-500 font-semibold">{a.turma?.replace(' Ano','')}</span>
                        <span className={`text-xs font-black text-center ${notaColor(a.lp2)}`}>{fmt(a.lp2)}</span>
                        <span className={`text-xs font-black text-center ${notaColor(a.ma2)}`}>{fmt(a.ma2)}</span>
                        <span className={`text-[10px] font-bold text-center ${sc.text}`}>{a.status}</span>
                        <span className={`text-sm font-black text-right ${notaColor(a.geralAtual)}`}>{fmt(a.geralAtual)}</span>
                      </div>
                      <div className="lg:hidden px-4 py-3 flex items-center gap-3">
                        <span className={`text-base font-black shrink-0 w-7 ${i===0?'text-yellow-500':i===1?'text-slate-400':i===2?'text-amber-700':'text-slate-300'}`}>{i<3?medalhas[i]:`${i+1}º`}</span>
                        <div className="flex-1 min-w-0">
                          <p className="text-xs font-bold text-slate-800 truncate">{a.nome}</p>
                          <p className="text-[11px] text-slate-500">{a.turma}</p>
                          <div className="flex gap-3 mt-0.5 text-[10px]">
                            <span className={`font-bold ${notaColor(a.lp2)}`}>LP {fmt(a.lp2)}</span>
                            <span className={`font-bold ${notaColor(a.ma2)}`}>Mat {fmt(a.ma2)}</span>
                            <span className={`font-bold ${sc.text}`}>{a.status}</span>
                          </div>
                        </div>
                        <span className={`text-lg font-black shrink-0 ${notaColor(a.geralAtual)}`}>{fmt(a.geralAtual)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              {rankingAlunos.length > limitRank && (
                <button onClick={()=>setLimitRank(l=>l+10)}
                  className="w-full mt-3 py-2.5 text-xs font-bold text-lotus-blue border border-lotus-blue-20 rounded-xl hover:bg-lotus-blue hover:text-white transition-all">
                  Ver mais {Math.min(10, rankingAlunos.length-limitRank)} alunos ↓
                </button>
              )}
              <p className="text-center text-[11px] text-slate-500 mt-3">{rankingAlunos.length} alunos · mostrando os {Math.min(limitRank,rankingAlunos.length)} melhores</p>
            </div>
          </div>
        )}
      </div>

    </div>
  );
};

// ── App Principal ─────────────────────────────────────────────────────────────
const App = () => {
  // ── DEMO: dados embutidos, sem API, sem login ──
  const [municipio, setMunicipio] = useState('');
  const [inputMunicipio, setInputMunicipio] = useState('');
  const [nomeVisitante, setNomeVisitante] = useState('');
  const [inputNome, setInputNome] = useState('');
  const [etapa, setEtapa] = useState('entrada'); // 'entrada' | 'intro' | 'sistema'
  const [role,setRole]=useState('secretario');
  const [selectedPolo,setSelectedPolo]=useState(null);
  const [selectedEscola,setSelectedEscola]=useState(null);
  const [breadcrumbs,setBreadcrumbs]=useState([{level:'rede',label:'Rede Municipal',data:null}]);
  const [alunoAtivo,setAlunoAtivo]=useState(null);
  const [abaAtiva,setAbaAtiva]=useState('dados');
  const [filtroItens,setFiltroItens]=useState(null);
  const [videoFalhou, setVideoFalhou] = useState(false);
  const videoRef = React.useRef(null);

  // Dados personalizados com o município do visitante
  const appData = React.useMemo(()=>{
    if(!municipio) return null;
    return {...DEMO_DATA, municipio};
  }, [municipio]);

  const confirmarEntrada = () => {
    const m = inputMunicipio.trim();
    const n = inputNome.trim();
    if(!m || !n) return;
    setMunicipio(m);
    setNomeVisitante(n);
    setEtapa('intro');
  };

  // Tocar vídeo após confirmação
  useEffect(()=>{
    if(etapa === 'intro' && videoRef.current){
      videoRef.current.play().catch(()=>{
        setVideoFalhou(true);
        setTimeout(()=>setEtapa('sistema'), 2500);
      });
    }
  },[etapa]);

  // Liberar sistema quando vídeo terminar
  // (usado pelo onEnded do vídeo)

  useEffect(()=>{
    if(role==='secretario') setBreadcrumbs([{level:'rede',label:'Rede Municipal',data:null}]);
    else if(role==='coord_polo') setBreadcrumbs(selectedPolo?[{level:'polo',label:`Polo: ${selectedPolo.polo}`,data:selectedPolo}]:[]);
    else if(role==='diretor') setBreadcrumbs(selectedEscola?[{level:'escola',label:selectedEscola.escola,data:selectedEscola}]:[]);
    setAlunoAtivo(null);
  },[role,selectedPolo,selectedEscola]);

  const handleRoleChange=v=>{setRole(v);setSelectedPolo(null);setSelectedEscola(null);setAlunoAtivo(null);};
  const handleDrillDown=(nextLevel,dataObj)=>{const labels={polo:`Polo: ${dataObj.polo}`,escola:dataObj.escola,turma:dataObj.turma};setBreadcrumbs(prev=>[...prev,{level:nextLevel,label:labels[nextLevel],data:dataObj}]);setAlunoAtivo(null);};
  const handleVerAluno=aluno=>{setBreadcrumbs(prev=>[...prev,{level:'aluno',label:aluno.nome,data:aluno}]);setAlunoAtivo(aluno);};
  const navigateTo=i=>{const crumbs=breadcrumbs.slice(0,i+1);setBreadcrumbs(crumbs);const last=crumbs[crumbs.length-1];setAlunoAtivo(last.level==='aluno'?last.data:null);};

  const currentView=breadcrumbs.length>0?breadcrumbs[breadcrumbs.length-1]:null;
  const listPolos=appData?.rede||[];
  const listEscolas=useMemo(()=>appData?.escolasPorPolo?Object.values(appData.escolasPorPolo).flat():[], [appData]);

  const renderView=()=>{
    if(abaAtiva==='sobre') return <ViewSobre/>;
    if(abaAtiva==='rankings') return <ViewRankings appData={appData}/>;
    if(abaAtiva==='paineis') return <ViewPaineis appData={appData} onIrParaItens={(filtro)=>{ setFiltroItens(filtro); setAbaAtiva('itens'); }} onIrParaEscola={(escola)=>{ setAbaAtiva('dados'); setBreadcrumbs([{level:'rede',label:'Rede Municipal',data:null},{level:'escola',label:escola.escola,data:escola}]); }}/>;
    if(abaAtiva==='itens') return <ViewAnaliseItens analiseItens={appData?.analiseItens} filtroExterno={filtroItens} onLimparFiltro={()=>setFiltroItens(null)}/>;
    if(!currentView){
      if(role==='coord_polo') return <SeletorPolo polos={listPolos} onSelect={setSelectedPolo}/>;
      if(role==='diretor')    return <SeletorEscola escolas={listEscolas} onSelect={setSelectedEscola}/>;
      return null;
    }
    switch(currentView.level){
      case 'rede':   return <ViewRede   appData={appData} onDrillDown={handleDrillDown}/>;
      case 'polo':   return <ViewPolo   appData={appData} poloData={currentView.data}   onDrillDown={handleDrillDown}/>;
      case 'escola': return <ViewEscola appData={appData} escolaData={currentView.data} onDrillDown={handleDrillDown}/>;
      case 'turma':  return <ViewTurma  appData={appData} turmaData={currentView.data}  onVerAluno={handleVerAluno}/>;
      case 'aluno':  return <ViewAluno  aluno={alunoAtivo} appData={appData}/>;
      default: return null;
    }
  };

  const titulos={rede:'Rede Municipal',polo:currentView?.data?.polo,escola:currentView?.data?.escola,turma:currentView?.data?.turma,aluno:currentView?.data?.nome};
  const podeVoltar=abaAtiva==='dados'&&breadcrumbs.length>1;
  const handleVoltar=()=>navigateTo(breadcrumbs.length-2);

  // ── TELA DE ENTRADA ──
  if(etapa === 'entrada') return (
    <div className="login-bg min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
      <div style={{position:'absolute',top:'-15%',left:'-10%',width:'40%',height:'40%',borderRadius:'50%',background:'rgba(255,255,255,0.04)',filter:'blur(40px)'}}/>
      <div style={{position:'absolute',bottom:'-15%',right:'-10%',width:'50%',height:'50%',borderRadius:'50%',background:'rgba(217,197,67,0.06)',filter:'blur(40px)'}}/>

      <div className="relative z-10 w-full max-w-sm">
        {/* Logo */}
        <div className="text-center mb-8">
          <img src="/logo-lotus-horizontal.png" alt="Instituto Lótus"
            style={{maxWidth:200,margin:'0 auto',filter:'brightness(0) invert(1)',opacity:0.9}}
            onError={e=>e.target.style.display='none'}/>
          <div style={{width:40,height:2,background:'#d9c543',borderRadius:999,margin:'16px auto 0'}}/>
        </div>

        {/* Card de entrada */}
        <div className="bg-white rounded-2xl p-6 shadow-xl">
          <div className="text-center mb-5">
            <p className="text-xs font-bold uppercase tracking-widest text-lotus-blue mb-1">Demonstração Interativa</p>
            <h2 className="text-xl font-black text-lotus-dark">Bem-vindo ao SIDME</h2>
            <p className="text-xs text-slate-400 mt-1.5 leading-relaxed">
              Sistema Inteligente de Diagnóstico e<br/>Monitoramento Educacional
            </p>
          </div>

          <div className="space-y-4">
            <div>
              <label className="text-xs font-bold text-slate-600 uppercase tracking-wider">Seu nome</label>
              <input
                type="text"
                placeholder="Ex: João Silva"
                value={inputNome}
                onChange={e=>setInputNome(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&confirmarEntrada()}
                className="w-full mt-1.5 px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus-lotus bg-slate-50"
              />
            </div>
            <div>
              <label className="text-xs font-bold text-slate-600 uppercase tracking-wider">Seu município</label>
              <input
                type="text"
                placeholder="Ex: Manaus, AM"
                value={inputMunicipio}
                onChange={e=>setInputMunicipio(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&confirmarEntrada()}
                className="w-full mt-1.5 px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus-lotus bg-slate-50"
              />
            </div>
            <button onClick={confirmarEntrada}
              disabled={!inputNome.trim()||!inputMunicipio.trim()}
              className="w-full py-3.5 rounded-xl font-black text-sm text-white transition-all active:scale-95 disabled:opacity-40"
              style={{background:'linear-gradient(135deg,#4a5c94,#2c375a)'}}>
              Explorar o Sistema →
            </button>
          </div>

          <div className="mt-5 pt-4 border-t border-slate-100 text-center">
            <p className="text-[10px] text-slate-400 leading-relaxed">
              Esta é uma demonstração com dados fictícios.<br/>
              Nenhum dado real de alunos é exibido.
            </p>
          </div>
        </div>

        {/* Frase */}
        <p className="text-center text-[11px] font-bold mt-5 leading-snug" style={{color:'rgba(217,197,67,0.7)'}}>
          "Conhecimento gera consciência.<br/>Consciência gera transformação real."
        </p>
      </div>
    </div>
  );

  // ── INTRO COM VÍDEO ──
  if(etapa === 'intro') return (
    <div className="login-bg min-h-screen flex flex-col items-center justify-center gap-6 relative overflow-hidden">
      <div style={{position:'absolute',top:'-15%',left:'-10%',width:'40%',height:'40%',borderRadius:'50%',background:'rgba(255,255,255,0.04)',filter:'blur(40px)'}}/>
      <div style={{position:'absolute',bottom:'-15%',right:'-10%',width:'50%',height:'50%',borderRadius:'50%',background:'rgba(217,197,67,0.06)',filter:'blur(40px)'}}/>
      <div style={{width:220,height:220,borderRadius:'50%',overflow:'hidden',boxShadow:'0 0 60px rgba(217,197,67,0.25)',flexShrink:0}}>
        <video ref={videoRef} src="/logo-animado.mp4" muted playsInline
          onEnded={()=>setEtapa('sistema')}
          onError={()=>{setVideoFalhou(true);setTimeout(()=>setEtapa('sistema'),2500);}}
          style={{width:'100%',height:'100%',objectFit:'cover',opacity:videoFalhou?0:1}}/>
        {videoFalhou && (
          <img src="/SIDME_icon_tela.png" alt="SIDME"
            style={{width:170,height:170,objectFit:'contain',animation:'pulse 2s ease-in-out infinite',position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}}/>
        )}
      </div>
      <div className="text-center px-8 relative z-10">
        <p className="text-[11px] font-bold uppercase tracking-[0.25em] text-white/50 mb-2">Olá, {nomeVisitante}!</p>
        <h1 className="text-white font-black text-xl leading-snug">Preparando o SIDME</h1>
        <h1 className="font-black text-xl leading-snug" style={{color:'#d9c543'}}>para {municipio}</h1>
      </div>
      <div className="flex flex-col items-center gap-3 relative z-10">
        <div className="loader" style={{borderColor:'rgba(255,255,255,0.15)',borderTopColor:'#d9c543'}}/>
        <p className="text-[11px] text-white/40">Carregando demonstração…</p>
      </div>
    </div>
  );

  

  return (
    <div className="flex flex-col min-h-screen" style={{background:'#f4f6f9'}}>
      {/* Header */}
      <header className="bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 shadow-sm sticky top-0 z-20 h-16">
        <div className="flex items-center gap-3">

H8O58+44d3Lz9saLhkh/cOmvX/AaM7d0CiFT61AAAAAElFTkSuQmCC" alt="Lótus" className="h-8 object-contain sm:hidden"/>
          <div className="h-6 w-px bg-slate-200 hidden sm:block"/>
          <div>
            <h1 className="text-sm font-black text-lotus-dark leading-none">SIDME</h1>
            <p className="text-[10px] text-lotus-blue uppercase tracking-wider font-bold">Nova Olinda do Norte</p>
          </div>
        </div>
        <select value={role} onChange={e=>handleRoleChange(e.target.value)} className="lg:hidden bg-slate-50 border border-slate-200 text-lotus-dark text-xs font-bold rounded-lg cursor-pointer py-2 pl-3 pr-8 outline-none focus-lotus transition-all max-w-[160px]">
          <option value="secretario">Secretaria</option>
          <option value="coord_polo">Coord. de Polo</option>
          <option value="diretor">Diretor de Escola</option>
        </select>
      </header>

      {/* Abas — só mobile (desktop usa sidebar) */}
      <div className="lg:hidden bg-white border-b border-slate-200 px-4 flex gap-4 sticky top-16 z-10">
        {[['dados','📊 Desempenho'],['paineis','📈 Painéis'],['rankings','🏆 Rankings'],['itens','🔬 Itens'],['sobre','ℹ️ Sobre']].map(([k,l])=>(
          <button key={k} onClick={()=>setAbaAtiva(k)} className={`py-3.5 text-xs font-semibold transition-colors ${abaAtiva===k?'tab-active':'tab-inactive hover:text-slate-800'}`}>{l}</button>
        ))}
      </div>

      {/* Layout: sidebar no desktop, normal no mobile */}
      <div className="app-layout flex-1">

        {/* Sidebar — só desktop */}
        <aside className="sidebar">
          {/* Abas como nav */}
          <div className="py-4">
            <p className="sidebar-crumb">Navegação</p>
            {[['dados','📊','Desempenho'],['paineis','📈','Painéis'],['rankings','🏆','Rankings'],['itens','🔬','Análise de Itens'],['sobre','ℹ️','Sobre o SIDME']].map(([k,ico,l])=>(
              <div key={k} onClick={()=>setAbaAtiva(k)} className={`sidebar-item ${abaAtiva===k?'active':''}`}>
                <span className="item-icon">{ico}</span>{l}
              </div>
            ))}

            {/* Breadcrumb como hierarquia na sidebar */}
            {abaAtiva==='dados' && breadcrumbs.length>0 && (
              <div className="mt-4">
                <p className="sidebar-crumb">Localização</p>
                {breadcrumbs.map((crumb,i)=>(
                  <div key={i} onClick={()=>navigateTo(i)}
                    className={`sidebar-item ${i===breadcrumbs.length-1?'active':''}`}
                    style={{paddingLeft: `${16 + i*12}px`, fontSize: i===0?13:12}}>
                    <span className="item-icon">{i===0?'🌐':i===1?'📍':i===2?'🏫':i===3?'👥':'👤'}</span>
                    <span className="truncate">{crumb.label}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Seletor de perfil na sidebar */}
            <div className="mt-6 px-4">
              <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Perfil</p>
              <select value={role} onChange={e=>handleRoleChange(e.target.value)}
                className="w-full bg-slate-50 border border-slate-200 text-lotus-dark text-xs font-bold rounded-lg cursor-pointer py-2 pl-3 pr-6 outline-none focus-lotus">
                <option value="secretario">Secretaria Municipal</option>
                <option value="coord_polo">Coord. de Polo</option>
                <option value="diretor">Diretor de Escola</option>
              </select>
            </div>
          </div>
        </aside>

        {/* Conteúdo principal */}
        <main className="main-content">
          <div className="max-w-5xl mx-auto lg:max-w-none"
            onTouchStart={e=>{ window._swipeX = e.touches[0].clientX; }}
            onTouchEnd={e=>{ const dx = e.changedTouches[0].clientX - (window._swipeX||0); if(dx>80 && podeVoltar) handleVoltar(); }}>

            {/* Botão voltar — mobile destacado, desktop discreto */}
            {podeVoltar&&(
              <button onClick={handleVoltar}
                className="lg:hidden flex items-center gap-2 mb-4 w-full font-bold text-sm bg-white px-4 py-3.5 rounded-xl border-2 border-lotus-blue-20 shadow-sm active:bg-lotus-blue active:text-white transition-all">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"/></svg>
                <span className="text-lotus-blue">← Voltar para <strong>{breadcrumbs[breadcrumbs.length-2]?.label}</strong></span>
              </button>
            )}

            {/* Título */}
            {abaAtiva==='dados'&&currentView&&(
              <div className="mb-5">
                <h2 className="text-xl md:text-2xl lg:text-3xl font-black text-lotus-dark leading-tight">{titulos[currentView.level]||currentView.label}</h2>
                <p className="text-lotus-blue font-bold tracking-widest uppercase text-[10px] mt-1">ADENON · SIDME</p>
              </div>
            )}
            {abaAtiva==='sobre'&&(
            <div className="mb-5">
              <h2 className="text-xl md:text-2xl lg:text-3xl font-black text-lotus-dark">Sobre o SIDME</h2>
              <p className="text-lotus-blue font-bold tracking-widest uppercase text-[11px] mt-1">Instituto Lótus · Desenvolvimento Humano e Social</p>
            </div>
          )}
          {abaAtiva==='rankings'&&(
            <div className="mb-5">
              <h2 className="text-xl md:text-2xl lg:text-3xl font-black text-lotus-dark">Rankings</h2>
              <p className="text-lotus-blue font-bold tracking-widest uppercase text-[10px] mt-1">Escolas e alunos mais bem posicionados</p>
            </div>
          )}
          {abaAtiva==='itens'&&(
              <div className="mb-5">
                <h2 className="text-xl md:text-2xl lg:text-3xl font-black text-lotus-dark">Análise de Itens</h2>
                <p className="text-lotus-blue font-bold tracking-widest uppercase text-[10px] mt-1">Diagnóstico pedagógico por habilidade</p>
              </div>
            )}
            {abaAtiva==='paineis'&&(
              <div className="mb-5">
                <h2 className="text-xl md:text-2xl lg:text-3xl font-black text-lotus-dark">Painéis Executivos</h2>
                <p className="text-lotus-blue font-bold tracking-widest uppercase text-[10px] mt-1">Visão analítica da rede</p>
              </div>
            )}

            {renderView()}
